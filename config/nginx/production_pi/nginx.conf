user www-data;
worker_processes auto;
worker_cpu_affinity auto;
pid /run/nginx.pid;
error_log /var/log/nginx/error.log;
include /etc/nginx/modules-enabled/*.conf;

events {
	worker_connections 4096;
	# multi_accept on;
}

http {

	##
	# Basic Settings
	##

	sendfile on;
	tcp_nopush on;
	types_hash_max_size 2048;
	server_tokens off; # Recommended practice is to turn this off

	tcp_nodelay on;   # 对大量小响应更友好（HLS 请求很多）
    	keepalive_timeout 65;

	    # 轻量文件缓存：减少频繁 open/stat 的开销（对 ts/m3u8 很有用）
    open_file_cache max=10000 inactive=20s;
    open_file_cache_valid 30s;
    open_file_cache_min_uses 2;
    open_file_cache_errors on;

	# server_names_hash_bucket_size 64;
	# server_name_in_redirect off;

	include /etc/nginx/mime.types;
	default_type application/octet-stream;

	##
	# SSL Settings
	##

	ssl_protocols TLSv1.2 TLSv1.3; # Dropping SSLv3 (POODLE), TLS 1.0, 1.1
	ssl_prefer_server_ciphers off; # Don't force server cipher order.

	##
	# Logging Settings
	##

	access_log /var/log/nginx/access.log;

	##
	# Gzip Settings
	##

	gzip on;

	gzip_vary on;
	gzip_proxied any;
	gzip_comp_level 5; # 树莓派上别拉太高，5/6 性价比最好

	# 目的是让 m3u8 这种小文本也尽量压缩，适合你“带宽小想省流量”的诉求；如果你发现树莓派 CPU 吃紧，再把它调回 1024。
	gzip_min_length 256;      # m3u8 往往很小，想省流量就调低些
	
	gzip_types
        text/plain
        text/css
        text/xml
        application/xml
        application/xml+rss
        application/json
        application/javascript
        application/x-javascript
        image/svg+xml
        application/vnd.apple.mpegurl
        application/x-mpegURL;
	# gzip_buffers 16 8k;
	# gzip_http_version 1.1;
	# gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

	##
	# Virtual Host Configs
	##

	include /etc/nginx/conf.d/*.conf;
	include /etc/nginx/sites-enabled/*;
}


